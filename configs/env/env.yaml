# Environment / physics configuration

# Vehicle parameters
m_dry: 100000.0          # kg, dry mass
m_prop_max: 1200000.0    # kg, max propellant mass
T_max: 6000000.0         # N, max thrust (3 sea-level Raptors)
Isp: 330.0               # s, specific impulse
T_min: 0.4               # minimum throttle fraction (Raptor floor)
delta_max: 0.35          # rad, max gimbal angle (~20 deg)
L: 50.0                  # m, vehicle length
g: 9.81                  # m/s^2

# Initial conditions
x0: 0.0                  # m
y0: 3000.0               # m
vx0: 0.0                 # m/s
vy0: -80.0               # m/s
theta0: 1.5708           # rad (pi/2, belly-down)
omega0: 0.0              # rad/s
mprop0: 1.0              # propellant fraction (full)

# Integration
dt: 0.05                 # s, Euler timestep

# Termination thresholds
y_catch: 50.0            # m, catch arm height above ground
x_max: 500.0             # m, horizontal boundary
theta_max: 4.712         # rad (3*pi/2), tumbling limit
t_max: 120.0             # s, episode timeout

# Success tolerances
success_x_tol: 1.0       # m
success_vy_tol: 2.0      # m/s
success_vx_tol: 1.0      # m/s
success_theta_tol: 0.175 # rad (~10 deg)

# Reward weights
w_x: 0.01
w_vy: 0.01
w_vx: 0.01
w_theta: 0.01
R_success: 100.0
