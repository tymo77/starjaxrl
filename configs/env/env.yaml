# Environment / physics configuration

# Vehicle parameters
m_dry: 100000.0          # kg, dry mass
m_prop_max: 12000.0    # kg, max propellant mass
T_max: 6000000.0         # N, max thrust (3 sea-level Raptors)
Isp: 330.0               # s, specific impulse
T_min: 0.4               # minimum throttle fraction (Raptor floor)
delta_max: 0.35          # rad, max gimbal angle (~20 deg)
L: 50.0                  # m, vehicle length
g: 9.81                  # m/s^2

# Initial conditions
x0: 0.0                  # m
y0: 3000.0               # m
vx0: 0.0                 # m/s
vy0: -80.0               # m/s
theta0: 1.5708           # rad (pi/2, belly-down)
omega0: 0.0              # rad/s
mprop0: 1.0              # propellant fraction (full)

# Integration
dt: 0.05                 # s, Euler timestep

# Termination thresholds
y_catch: 50.0            # m, catch arm height above ground
x_max: 500.0             # m, horizontal boundary
theta_max: 4.712         # rad (3*pi/2), tumbling limit
t_max: 120.0             # s, episode timeout

# Success tolerances
success_x_tol: 1.0       # m
success_vy_tol: 2.0      # m/s
success_vx_tol: 1.0      # m/s
success_theta_tol: 0.175 # rad (~10 deg)

# Reward — Gaussian shaping + time penalty + sparse success bonus
#
#   r(t) = w_x     * exp(-0.5*(x/sigma_x)^2)
#         + w_vy    * exp(-0.5*(vy/sigma_vy)^2)
#         + w_vx    * exp(-0.5*(vx/sigma_vx)^2)
#         + w_theta * exp(-0.5*(theta/sigma_theta)^2)
#         - w_time
#         + R_success   (if done and within success tolerances)
#
# Each Gaussian returns 1.0 at the target and exp(-0.5)≈0.6 at ±sigma.
# Sigmas are tuned to cover realistic mid-flight state ranges so that
# gradient signal is present throughout the episode, not just near success.

# Per-dimension weights
w_x:     1.0
w_vy:    1.0
w_vx:    0.5
w_theta: 1.0

# Per-dimension spreads (1-sigma = value where reward ≈ 0.6)
sigma_x:     50.0    # m     — gradient visible across ±150 m lateral range
sigma_vy:    30.0    # m/s   — gradient across 0 to ~-90 m/s descent
sigma_vx:    10.0    # m/s   — gradient across lateral drift
sigma_theta:  0.5    # rad   — gradient through most of the flip maneuver (~29°)

# Time penalty and sparse success bonus
w_time:    0.01
R_success: 100.0
