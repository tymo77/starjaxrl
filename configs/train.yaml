# Top-level training configuration
defaults:
  - env: env
  - ppo: ppo
  - network: network
  - _self_

seed: 42
n_updates: 1000          # total number of PPO update steps
checkpoint_every: 50     # save checkpoint every N updates
eval_every: 25           # run eval rollout every N updates
log_every: 10            # log metrics every N updates

wandb:
  project: starjaxrl
  entity: null           # set to your wandb username or leave null
  mode: online           # online | offline | disabled
