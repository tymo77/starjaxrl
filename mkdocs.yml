site_name: StarJAXRL
site_description: Starship belly-flop landing and CartPole balancing via JAX-based reinforcement learning
site_url: https://tymo77.github.io/starjaxrl
repo_url: https://github.com/tymo77/starjaxrl
repo_name: tymo77/starjaxrl

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - Environments:
    - Starship Landing: environments/starship.md
    - CartPole Balancing: environments/cartpole.md
  - Training: training.md
  - Design Notes:
    - Overview: design/00_overview.md
    - Problem Spec: design/01_problem_spec.md
    - Simulation: design/02_simulation.md
    - RL Algorithm: design/03_rl_algorithm.md
    - Neural Network: design/04_neural_network.md
    - Training Infra: design/05_training_infra.md
    - Roadmap: design/06_todos.md
    - Project Plan: design/07_project_plan.md
  - API Reference:
    - Physics: api/physics.md
    - Environments: api/environments.md
    - Agents: api/agents.md
    - Training: api/training.md
